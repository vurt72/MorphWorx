name: Build and release MetaModule plugin

on:
  workflow_dispatch:
    inputs:
      SDK_branch:
        description: 'MetaModule SDK branch'
        required: true
        type: choice
        default: main
        options:
          - main
      do_release:
        description: 'Create Release (must also select Tag above!")'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-lin:
    strategy:
      matrix:
        gcc: ['12.3.Rel1']
    name: 'Build firmware on linux'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ matrix.gcc }}

      - name: Git setup
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build
        run: |
          cmake -B build -G Ninja -DMETAMODULE_SDK_DIR=metamodule-plugin-sdk
          cmake --build build
          # Add version tag and required firmware version to the plugin file name:
          cd metamodule-plugins && for f in *.mmplugin; do mv $f ${f%.mmplugin}-${{ github.ref_name }}.mmplugin; done;

      - name: Release
        if: ${{ startsWith(github.ref, 'refs/tags/') && inputs.do_release }}
        uses: softprops/action-gh-release@v2
        with:
          name: 'Release: ${{ github.ref_name }}'
          files: |
            metamodule-plugins/*.mmplugin